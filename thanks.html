<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ご応募ありがとうございます｜MOTE LAB トレーナー募集</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#FAF7F2;--green:#2E4A3D;--green-dark:#243A30;--gold-lt:#D8C39A;--terracotta:#B5704F;--line-green:#06C755;
      --font:'Zen Maru Gothic',system-ui,-apple-system,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--green-dark);color:#FAF7F2;padding:40px 20px;line-height:1.9;}
    .box{max-width:540px;text-align:center;}
    .check{width:74px;height:74px;border-radius:50%;background:rgba(221,229,221,.08);border:2px solid var(--terracotta);
      display:flex;align-items:center;justify-content:center;margin:0 auto 26px;}
    .check svg{width:34px;height:34px;stroke:var(--gold-lt);}
    .eyebrow{letter-spacing:.22em;color:var(--gold-lt);font-size:12px;margin-bottom:14px;}
    h1{font-size:26px;font-weight:500;line-height:1.5;margin-bottom:16px;letter-spacing:.03em;}
    p{color:rgba(250,247,242,.7);font-size:14.5px;line-height:2;margin-bottom:8px;}
    .line-lead{margin-top:30px;font-size:13px;color:rgba(250,247,242,.6);margin-bottom:12px;}
    .line-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--line-green);
      color:#fff;padding:14px 30px;border-radius:99px;font-size:15px;font-weight:700;text-decoration:none;
      box-shadow:0 4px 14px rgba(6,199,85,.35);}
    .back{display:inline-block;margin-top:22px;color:rgba(250,247,242,.55);font-size:13px;text-decoration:underline;}
  </style>
</head>
<body>
  <div class="box">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <div class="eyebrow">Thank You</div>
    <h1>ご応募、<br>ありがとうございます。</h1>
    <p>内容を確認のうえ、担当より面談のご連絡をいたします。<br>まずはお話しできるのを楽しみにしています。</p>

    <div class="line-lead">先に少し話を聞きたい方は、公式LINEからどうぞ。</div>
    <a class="line-btn" href="https://lin.ee/QVKHSTm" target="_blank" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.3c-5.52 0-10 3.62-10 8.08 0 3.99 3.55 7.33 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.89l-.14.84c-.04.25-.2 1 .88.54 1.07-.45 5.78-3.4 7.89-5.83C21.27 13.6 22 12.04 22 10.38 22 5.92 17.52 2.3 12 2.3zM8.13 12.6H6.2a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .81 0v2.86h1.52a.4.4 0 0 1 0 .81zm1.5-.4a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .81 0v3.27zm3.93 0a.4.4 0 0 1-.28.38.4.4 0 0 1-.45-.15l-1.68-2.29v2.06a.4.4 0 0 1-.81 0V8.93a.4.4 0 0 1 .73-.23l1.68 2.29V8.93a.4.4 0 0 1 .81 0v3.27zm2.86-2.04a.4.4 0 0 1 0 .81h-1.13v.82h1.13a.4.4 0 0 1 0 .81h-1.53a.4.4 0 0 1-.4-.4V8.93a.4.4 0 0 1 .4-.4h1.53a.4.4 0 0 1 0 .81h-1.13v.82h1.13z"/></svg>
      公式LINEで相談する
    </a>
    <br/>
    <a class="back" href="/">トップに戻る</a>
  </div>
</body>
</html>
